<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính toán thi đua</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .gần-đạt { background-color: #fff3cd; }  /* vàng nhạt */
        .đạt { background-color: #d1e7dd; }       /* xanh lá nhạt */
    </style>
</head>
<body class="container py-4">
    <h2 class="mb-4">🏆 Chương trình thi đua</h2>

    <!-- Phần nhập thông tin chương trình -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Tên chương trình</label>
                    <input type="text" id="tenCT" class="form-control" value="Thi đua quý I/2025">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Ngày bắt đầu</label>
                    <input type="date" id="ngayBD" class="form-control" value="2025-01-01">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Ngày kết thúc</label>
                    <input type="date" id="ngayKT" class="form-control" value="2025-03-31">
                </div>
            </div>
        </div>
    </div>

    <!-- Điều kiện & Thưởng -->
    <div class="card mb-4">
        <div class="card-header fw-bold">Điều kiện và phần thưởng</div>
        <div class="card-body">
            <div id="dieuKienContainer">
                <!-- 6 dòng điều kiện, mỗi dòng có 2 ô -->
                <div class="row mb-2 align-items-end">
                    <div class="col-md-6"><label class="form-label">Điều kiện doanh số (VD: >30000000, >=50000000)</label></div>
                    <div class="col-md-4"><label class="form-label">Thưởng (VNĐ)</label></div>
                </div>
                <div id="dkRows"></div>
            </div>
            <button class="btn btn-outline-secondary btn-sm mt-2" onclick="themDieuKien()">+ Thêm điều kiện</button>
        </div>
    </div>

    <!-- Bảng dữ liệu nhân viên (mẫu) -->
    <div class="card mb-4">
        <div class="card-header fw-bold">Dữ liệu nhân viên và doanh số trong kỳ</div>
        <div class="card-body">
            <table class="table table-bordered" id="bangNhanVien">
                <thead>
                    <tr>
                        <th>Tên nhân viên</th>
                        <th>Doanh số (VNĐ)</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>Nguyễn Văn A</td><td><input type="number" class="form-control doanhso" value="45000000"></td><td><button class="btn btn-danger btn-sm" onclick="xoaDong(this)">Xoá</button></td></tr>
                    <tr><td>Trần Thị B</td><td><input type="number" class="form-control doanhso" value="25000000"></td><td><button class="btn btn-danger btn-sm" onclick="xoaDong(this)">Xoá</button></td></tr>
                    <tr><td>Lê Văn C</td><td><input type="number" class="form-control doanhso" value="60000000"></td><td><button class="btn btn-danger btn-sm" onclick="xoaDong(this)">Xoá</button></td></tr>
                    <tr><td>Phạm Thị D</td><td><input type="number" class="form-control doanhso" value="28000000"></td><td><button class="btn btn-danger btn-sm" onclick="xoaDong(this)">Xoá</button></td></tr>
                </tbody>
            </table>
            <button class="btn btn-outline-primary btn-sm" onclick="themNhanVien()">+ Thêm nhân viên</button>
        </div>
    </div>

    <!-- Nút tính toán -->
    <button class="btn btn-success btn-lg mb-4" onclick="tinhThiDua()">📊 Tính toán thi đua</button>

    <!-- Kết quả -->
    <div class="card">
        <div class="card-header fw-bold">Kết quả thi đua</div>
        <div class="card-body">
            <table class="table table-bordered" id="bangKetQua">
                <thead>
                    <tr>
                        <th>Tên</th>
                        <th>Doanh số</th>
                        <th>Mức đạt</th>
                        <th>Thưởng (VNĐ)</th>
                        <th>Tiến độ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" class="text-center text-muted">Chưa có dữ liệu</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Khởi tạo 6 dòng điều kiện mặc định
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('dkRows');
            for (let i = 0; i < 6; i++) {
                container.appendChild(taoDongDieuKien());
            }
        });

        function taoDongDieuKien() {
            const div = document.createElement('div');
            div.className = 'row mb-2';
            div.innerHTML = `
                <div class="col-md-6">
                    <input type="text" class="form-control dieuKien" placeholder=">30000000" value="">
                </div>
                <div class="col-md-4">
                    <input type="number" class="form-control thuong" placeholder="500000" value="">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-danger btn-sm" onclick="xoaDieuKien(this)">Xoá</button>
                </div>`;
            return div;
        }

        function themDieuKien() {
            document.getElementById('dkRows').appendChild(taoDongDieuKien());
        }

        function xoaDieuKien(btn) {
            btn.closest('.row').remove();
        }

        function themNhanVien() {
            const tbody = document.querySelector('#bangNhanVien tbody');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="form-control" placeholder="Tên"></td>
                <td><input type="number" class="form-control doanhso" value="0"></td>
                <td><button class="btn btn-danger btn-sm" onclick="xoaDong(this)">Xoá</button></td>`;
            tbody.appendChild(tr);
        }

        function xoaDong(btn) {
            btn.closest('tr').remove();
        }

        // Hàm chính: tính toán thi đua
        function tinhThiDua() {
            // Lấy danh sách điều kiện và thưởng (bỏ qua dòng trống)
            const dkRows = document.querySelectorAll('#dkRows .row');
            const dieuKiens = [];
            dkRows.forEach(row => {
                const dkInput = row.querySelector('.dieuKien');
                const thuongInput = row.querySelector('.thuong');
                const dkText = dkInput.value.trim();
                const thuong = parseInt(thuongInput.value) || 0;
                if (dkText !== '') {
                    dieuKiens.push({ text: dkText, thuong: thuong });
                }
            });

            if (dieuKiens.length === 0) {
                alert('Vui lòng nhập ít nhất một điều kiện.');
                return;
            }

            // Parse điều kiện thành hàm kiểm tra
            // Hỗ trợ dạng >, >=, <, <=, =, và có thể có dấu phân cách hàng nghìn (tạm bỏ)
            dieuKiens.forEach(dk => {
                const str = dk.text.replace(/,/g, ''); // bỏ dấu phẩy nếu có
                const match = str.match(/^(>=?|<=?|=)?\s*(\d+(\.\d+)?)$/);
                if (match) {
                    const operator = match[1] || '>=';
                    const value = parseFloat(match[2]);
                    dk.operator = operator;
                    dk.value = value;
                } else {
                    alert(`Điều kiện "${dk.text}" không hợp lệ. Vui lòng nhập dạng: >30000000, >=50000000, =10000000, <20000000, <=15000000`);
                    throw new Error('Điều kiện không hợp lệ');
                }
            });

            // Sắp xếp điều kiện theo giá trị doanh số giảm dần (ưu tiên mức cao nhất)
            dieuKiens.sort((a, b) => b.value - a.value);

            // Lấy danh sách nhân viên
            const rowsNV = document.querySelectorAll('#bangNhanVien tbody tr');
            const nhanViens = [];
            rowsNV.forEach(row => {
                const tenInput = row.querySelector('td:first-child input');
                const dsInput = row.querySelector('.doanhso');
                const ten = tenInput ? tenInput.value.trim() : row.cells[0].innerText.trim();
                const doanhso = parseFloat(dsInput.value) || 0;
                if (ten !== '') {
                    nhanViens.push({ ten, doanhso });
                }
            });

            // Xác định kết quả
            const ketQua = nhanViens.map(nv => {
                // Tìm mức đạt cao nhất (điều kiện có value lớn nhất mà nv đạt)
                let mucDat = null;
                let thuong = 0;
                for (let dk of dieuKiens) {
                    let dat = false;
                    switch (dk.operator) {
                        case '>': dat = nv.doanhso > dk.value; break;
                        case '>=': dat = nv.doanhso >= dk.value; break;
                        case '<': dat = nv.doanhso < dk.value; break;
                        case '<=': dat = nv.doanhso <= dk.value; break;
                        case '=': dat = nv.doanhso === dk.value; break;
                    }
                    if (dat) {
                        mucDat = dk;
                        thuong = dk.thuong;
                        break; // lấy mức cao nhất đầu tiên
                    }
                }

                // Tính tiến độ (dựa trên mức cao nhất)
                const maxValue = dieuKiens[0]?.value || 0;
                const tienDo = maxValue ? (nv.doanhso / maxValue * 100).toFixed(1) : 100;

                // Xác định xem có "gần đạt" không: nếu chưa đạt mức thấp nhất nhưng >= 80% mức thấp nhất
                const minValue = dieuKiens[dieuKiens.length - 1]?.value || 0;
                const ganDat = !mucDat && minValue > 0 && nv.doanhso >= minValue * 0.8;

                return {
                    ten: nv.ten,
                    doanhso: nv.doanhso,
                    mucDat: mucDat ? `${mucDat.text} (thưởng ${thuong.toLocaleString('vi-VN')}₫)` : 'Chưa đạt',
                    thuong: thuong,
                    tienDo: tienDo,
                    ganDat: ganDat
                };
            });

            // Sắp xếp kết quả: đạt trước, rồi gần đạt, rồi còn lại
            ketQua.sort((a, b) => {
                if (a.thuong !== b.thuong) return b.thuong - a.thuong; // thưởng cao trước
                if (a.ganDat !== b.ganDat) return b.ganDat ? 1 : -1;
                return b.doanhso - a.doanhso;
            });

            // Hiển thị kết quả
            const tbody = document.querySelector('#bangKetQua tbody');
            tbody.innerHTML = '';
            ketQua.forEach(nv => {
                const tr = document.createElement('tr');
                if (nv.thuong > 0) tr.className = 'đạt';
                else if (nv.ganDat) tr.className = 'gần-đạt';

                tr.innerHTML = `
                    <td>${nv.ten}</td>
                    <td>${nv.doanhso.toLocaleString('vi-VN')}₫</td>
                    <td>${nv.mucDat}</td>
                    <td>${nv.thuong.toLocaleString('vi-VN')}₫</td>
                    <td>
                        <div class="progress" style="height: 20px;">
                            <div class="progress-bar ${nv.thuong > 0 ? 'bg-success' : (nv.ganDat ? 'bg-warning' : 'bg-secondary')}" 
                                 style="width: ${Math.min(nv.tienDo, 100)}%">
                                ${nv.tienDo}%
                            </div>
                        </div>
                    </td>`;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
